name: Ejecutar scraper imoova cada 30 minutos

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar Chromium y dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver
          pip install -r requirements.txt

      - name: Ejecutar script
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
        run: python3 scraper.py

      - name: Commit updated offers.json
        run: |
          git config --global user.email "bot@github.com"
          git config --global user.name "GitHub Action Bot"
          
          # Añadimos el archivo de ofertas actualizado
          git add offers.json
          
          # Guarda los cambios localmente
          git commit -m "Update offers.json" || echo "No changes to commit"
          
          # Trae lo que haya en la web y fusiona de forma segura antes de subir
          git pull --rebase origin main
          
          # Sube el archivo final a tu repositorio
          git push origin HEAD:main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
